<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de Chave de Ativacao</title>
  <style>
    :root{
      --blue:#123b98;
      --blue-dark:#0f2f78;
      --line:#dbe5f3;
      --bg:#f4f8ff;
      --text:#17345f;
      --muted:#667793;
      --ok:#12824c;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
      font-family:"Segoe UI",Tahoma,sans-serif;
      background:linear-gradient(135deg,#eef4ff 0%,#ffffff 100%);
      color:var(--text);
    }
    .card{
      width:min(100%,520px);
      background:#fff;
      border:1px solid var(--line);
      border-radius:20px;
      box-shadow:0 18px 45px rgba(18,59,152,.14);
      overflow:hidden;
    }
    .head{
      padding:22px 24px;
      background:var(--blue);
      color:#fff;
    }
    .head h1{
      margin:0 0 6px;
      font-size:24px;
      line-height:1.1;
    }
    .head p{
      margin:0;
      font-size:14px;
      opacity:.92;
    }
    .body{
      padding:22px 24px 24px;
    }
    label{
      display:block;
      margin:0 0 8px;
      font-size:14px;
      font-weight:700;
    }
    input{
      width:100%;
      height:46px;
      padding:12px 14px;
      border:1px solid var(--line);
      border-radius:12px;
      font-size:15px;
      color:var(--text);
      outline:none;
    }
    input:focus{
      border-color:#2c64d8;
      box-shadow:0 0 0 4px rgba(44,100,216,.12);
    }
    .row{
      display:grid;
      gap:10px;
      margin-top:16px;
    }
    .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:18px;
    }
    button{
      min-height:44px;
      border:none;
      border-radius:12px;
      padding:10px 14px;
      font-size:15px;
      font-weight:800;
      cursor:pointer;
    }
    .primary{
      background:var(--blue);
      color:#fff;
    }
    .secondary{
      background:#edf3ff;
      color:var(--blue-dark);
    }
    .hint{
      margin-top:16px;
      font-size:13px;
      line-height:1.45;
      color:var(--muted);
    }
    .result{
      margin-top:18px;
      padding:14px;
      border-radius:14px;
      border:1px solid #cfe0ff;
      background:var(--bg);
    }
    .result strong{
      display:block;
      margin-bottom:6px;
      font-size:13px;
    }
    .resultCode{
      font-size:20px;
      font-weight:900;
      letter-spacing:1px;
      color:var(--blue-dark);
      word-break:break-word;
    }
    .msg{
      min-height:20px;
      margin-top:12px;
      font-size:13px;
      color:#c0392b;
    }
    .msg.ok{color:var(--ok)}
  </style>
</head>
<body>
  <main class="card">
    <section class="head">
      <h1>Gerador de Chave</h1>
      <p>Digite o codigo de registro do cliente para gerar a chave de ativacao.</p>
    </section>

    <section class="body">
      <label for="registrationCode">Codigo de registro</label>
      <input id="registrationCode" type="text" placeholder="Ex.: ABCD-EFGH-JKLM">

      <div class="actions">
        <button id="generateBtn" class="primary" type="button">Gerar chave</button>
        <button id="copyBtn" class="secondary" type="button">Copiar chave</button>
      </div>

      <div class="result">
        <strong>Chave de ativacao</strong>
        <div id="licenseKey" class="resultCode">-</div>
      </div>

      <div id="msg" class="msg"></div>

      <p class="hint">
        Uso rapido:
        1. O cliente te envia o codigo de registro.
        2. Voce gera a chave aqui.
        3. Envia a chave para ele ativar o programa.
      </p>
    </section>
  </main>

  <script>
    (function(){
      const LICENSE_SECRET = "PAULO-CFF-ATIVACAO-2026";

      function byId(id){ return document.getElementById(id); }
      function setMsg(text, ok){
        const el = byId("msg");
        el.textContent = text || "";
        el.classList.toggle("ok", !!ok);
      }
      function normLicense(value){
        return String(value || "").trim().toUpperCase().replace(/\s+/g, "");
      }
      function licenseNumber(text, seed){
        let total = seed;
        const raw = String(text || "");
        const mod = 4294967291;
        for(let i = 0; i < raw.length; i += 1){
          const code = raw.charCodeAt(i);
          total = (total + (code * (i + 17))) % mod;
          total = ((total * 131) + code) % mod;
        }
        return total;
      }
      function generateActivationKey(registrationCode){
        const cleaned = normLicense(registrationCode);
        if(!cleaned){
          return "";
        }
        const part1 = licenseNumber(LICENSE_SECRET + "|" + cleaned, 7).toString(36).toUpperCase().padStart(8, "0").slice(-8);
        const part2 = licenseNumber(cleaned + "|" + LICENSE_SECRET, 11).toString(36).toUpperCase().padStart(8, "0").slice(-8);
        return (part1 + part2).match(/.{1,4}/g).join("-");
      }

      byId("generateBtn").addEventListener("click", function(){
        const code = byId("registrationCode").value;
        if(!normLicense(code)){
          byId("licenseKey").textContent = "-";
          setMsg("Digite o codigo de registro.", false);
          return;
        }
        const key = generateActivationKey(code);
        byId("licenseKey").textContent = key;
        setMsg("Chave gerada com sucesso.", true);
      });

      byId("copyBtn").addEventListener("click", async function(){
        const key = byId("licenseKey").textContent.trim();
        if(!key || key === "-"){
          setMsg("Gere a chave antes de copiar.", false);
          return;
        }
        try{
          await navigator.clipboard.writeText(key);
          setMsg("Chave copiada.", true);
        }catch(_error){
          setMsg("Nao foi possivel copiar automaticamente.", false);
        }
      });

      byId("registrationCode").addEventListener("keydown", function(event){
        if(event.key === "Enter"){
          byId("generateBtn").click();
        }
      });
    })();
  </script>
</body>
</html>
