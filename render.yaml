services:
  - type: web
    name: controle-financeiro-familiar-sales
    runtime: node
    rootDir: sales-portal
    plan: starter
    autoDeployTrigger: commit
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PUBLIC_BASE_URL
        value: https://controle-financeiro-familiar-sales.onrender.com
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: LICENSE_AMOUNT
        value: "4990"
      - key: LICENSE_CURRENCY
        value: brl
      - key: LICENSE_PRODUCT_NAME
        value: Controle Financeiro Familiar
      - key: LICENSE_PRODUCT_DESCRIPTION
        value: Licenca definitiva do programa
      - key: LICENSE_SECRET
        sync: false
      - key: CHECKOUT_PAYMENT_METHOD_TYPES
        value: card
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SUPPORT_EMAIL
        sync: false
